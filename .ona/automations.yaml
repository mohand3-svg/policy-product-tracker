services:
  dashboard-backend:
    name: Stewardship Dashboard Backend
    description: >-
      FastAPI backend that serves the static frontend and read-only Foundry
      endpoints (/api/wins, /api/metrics, /api/health) on port 8080.
      Foundry config comes from env secrets: FOUNDRY_HOST and either
      FOUNDRY_TOKEN or (FOUNDRY_CLIENT_ID + FOUNDRY_CLIENT_SECRET).
      Optional: FOUNDRY_BRANCH (defaults to master).
    triggeredBy:
      - postDevcontainerStart
    commands:
      start: |
        cd /workspaces/workspaces/backend
        python3 -m venv .venv
        . .venv/bin/activate
        pip install --disable-pip-version-check -q -r requirements.txt
        exec uvicorn main:app --host 0.0.0.0 --port 8080
      ready: curl -sf http://localhost:8080/api/health > /dev/null
