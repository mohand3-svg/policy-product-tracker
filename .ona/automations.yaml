services:
  mockup-server:
    name: Stewardship Mockup Server
    description: Serves the static Policy Intelligence Stewardship Tool mockup on port 8080
    triggeredBy:
      - postDevcontainerStart
    commands:
      start: |
        command -v python3 >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y python3)
        cd /workspaces/workspaces && exec python3 -m http.server 8080 --bind 0.0.0.0
      ready: curl -sf http://localhost:8080/index.html > /dev/null
